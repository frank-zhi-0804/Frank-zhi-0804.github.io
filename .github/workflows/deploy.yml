name: Deploy Astro to GitHub Pages

# 触发条件：main分支推送，或手动触发
on:
  push:
    branches: [ main ]
  workflow_dispatch:

# 权限配置（必须，否则部署失败）
permissions:
  contents: read
  pages: write
  id-token: write

# 环境配置
env:
  ASTRO_TARGET: github-pages

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Astro site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4